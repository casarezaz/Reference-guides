<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MITRE ATT&CK Interactive Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e17; --surface: #111827; --surface2: #1e293b; --border: #334155;
  --text: #e2e8f0; --text2: #94a3b8; --accent: #3b82f6; --accent2: #8b5cf6;
  --red: #ef4444; --orange: #f97316; --yellow: #eab308; --green: #22c55e; --cyan: #06b6d4;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { display: flex; flex-direction: column; height: 100vh; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 18px; font-weight: 700; }
.header h1 span { color: var(--accent); }
.tabs { display: flex; gap: 4px; margin-left: 24px; }
.tab { padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; background: transparent; border: 1px solid transparent; color: var(--text2); transition: all 0.2s; }
.tab:hover { background: var(--surface2); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.search-bar { margin-left: auto; position: relative; }
.search-bar input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 36px; color: var(--text); font-size: 13px; width: 300px; outline: none; }
.search-bar input:focus { border-color: var(--accent); }
.search-bar svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text2); fill: none; }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
.sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
.sidebar-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; }
.tactic-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 2px; transition: background 0.15s; }
.tactic-item:hover { background: var(--surface2); }
.tactic-item.active { background: rgba(59,130,246,0.15); color: var(--accent); }
.tactic-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tactic-count { margin-left: auto; font-size: 11px; color: var(--text2); background: var(--surface2); padding: 2px 6px; border-radius: 10px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }
.matrix-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.matrix-col { background: var(--surface); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
.matrix-col-header { padding: 10px 12px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid; }
.matrix-col-body { padding: 4px; max-height: 500px; overflow-y: auto; }
.tech-card { padding: 8px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; margin: 2px 0; transition: all 0.15s; border-left: 3px solid transparent; }
.tech-card:hover { background: var(--surface2); border-left-color: var(--accent); }
.tech-card .tech-id { font-size: 10px; color: var(--text2); font-family: monospace; }
.detail-panel { position: fixed; right: 0; top: 0; width: 480px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform 0.3s ease; z-index: 100; overflow-y: auto; box-shadow: -4px 0 20px rgba(0,0,0,0.3); }
.detail-panel.open { transform: translateX(0); }
.detail-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; background: var(--surface); z-index: 1; }
.detail-close { cursor: pointer; padding: 4px; border-radius: 4px; background: none; border: none; color: var(--text2); font-size: 18px; }
.detail-close:hover { background: var(--surface2); color: var(--text); }
.detail-body { padding: 20px; }
.detail-body h2 { font-size: 18px; margin-bottom: 4px; }
.detail-body .tech-id-large { font-family: monospace; color: var(--accent); font-size: 14px; margin-bottom: 16px; }
.detail-section { margin-bottom: 20px; }
.detail-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; }
.detail-section p { font-size: 13px; line-height: 1.6; color: var(--text); }
.tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; margin: 2px; }
.tag-platform { background: rgba(6,182,212,0.15); color: var(--cyan); }
.tag-ds { background: rgba(139,92,246,0.15); color: var(--accent2); }
.tag-severity { padding: 3px 10px; border-radius: 12px; font-weight: 600; }
.severity-high { background: rgba(239,68,68,0.15); color: var(--red); }
.severity-med { background: rgba(249,115,22,0.15); color: var(--orange); }
.severity-low { background: rgba(234,179,8,0.15); color: var(--yellow); }
.chain-builder { padding: 20px; }
.chain-area { background: var(--surface); border: 2px dashed var(--border); border-radius: 12px; min-height: 120px; padding: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.chain-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; cursor: grab; }
.chain-item .remove { cursor: pointer; color: var(--text2); font-size: 14px; }
.chain-item .remove:hover { color: var(--red); }
.chain-arrow { color: var(--text2); font-size: 18px; }
.chain-placeholder { color: var(--text2); font-size: 13px; text-align: center; width: 100%; }
.btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text); transition: all 0.15s; }
.btn:hover { background: var(--border); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,0.15); }
.chain-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.chain-analysis { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.chain-analysis h4 { margin-bottom: 12px; }
.detection-gaps { display: flex; flex-direction: column; gap: 8px; }
.gap-item { padding: 8px 12px; background: var(--surface2); border-radius: 6px; font-size: 12px; display: flex; justify-content: space-between; }
.quiz-view { max-width: 700px; margin: 0 auto; }
.quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
.quiz-card h3 { font-size: 16px; margin-bottom: 16px; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-option { padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.quiz-option:hover { border-color: var(--accent); background: rgba(59,130,246,0.05); }
.quiz-option.correct { border-color: var(--green); background: rgba(34,197,94,0.1); }
.quiz-option.incorrect { border-color: var(--red); background: rgba(239,68,68,0.1); }
.quiz-option.selected { border-color: var(--accent); background: rgba(59,130,246,0.1); }
.quiz-score { text-align: center; padding: 16px; background: var(--surface); border-radius: 8px; margin-bottom: 16px; }
.quiz-score .score-num { font-size: 36px; font-weight: 700; color: var(--accent); }
.stats-bar { display: flex; gap: 16px; margin-bottom: 16px; }
.stat-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
.stat-card .stat-num { font-size: 28px; font-weight: 700; }
.stat-card .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
.overlay.open { display: block; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

function getAllTechniques() {
  let all = [];
  TACTICS.forEach(t => t.techniques.forEach(tech => all.push({...tech, tactic: t.name, tacticColor: t.color})));
  return all;
}

function filterTechniques(query) {
  if (!query) return getAllTechniques();
  const q = query.toLowerCase();
  return getAllTechniques().filter(t =>
    t.name.toLowerCase().includes(q) || t.id.toLowerCase().includes(q) ||
    t.desc.toLowerCase().includes(q) || t.platforms.some(p => p.toLowerCase().includes(q)) ||
    t.dataSources.some(d => d.toLowerCase().includes(q))
  );
}

function generateQuiz() {
  const all = getAllTechniques();
  const questions = [];
  const types = ['id_to_name', 'name_to_tactic', 'desc_to_name', 'mitigation', 'detection', 'platform'];

  for (let i = 0; i < 20; i++) {
    const type = types[Math.floor(Math.random() * types.length)];
    const correct = all[Math.floor(Math.random() * all.length)];
    const others = all.filter(t => t.id !== correct.id).sort(() => Math.random() - 0.5).slice(0, 3);
    let question, options, answer;

    switch(type) {
      case 'id_to_name':
        question = `What technique is ${correct.id}?`;
        options = [correct.name, ...others.map(o => o.name)].sort(() => Math.random() - 0.5);
        answer = correct.name;
        break;
      case 'name_to_tactic':
        question = `Which tactic does "${correct.name}" belong to?`;
        const tactics = [...new Set(TACTICS.map(t => t.name))];
        const wrongTactics = tactics.filter(t => t !== correct.tactic).sort(() => Math.random() - 0.5).slice(0, 3);
        options = [correct.tactic, ...wrongTactics].sort(() => Math.random() - 0.5);
        answer = correct.tactic;
        break;
      case 'desc_to_name':
        question = `Which technique: "${correct.desc.substring(0, 100)}..."`;
        options = [correct.name, ...others.map(o => o.name)].sort(() => Math.random() - 0.5);
        answer = correct.name;
        break;
      case 'mitigation':
        question = `Which is a valid mitigation for "${correct.name}"?`;
        const correctMit = correct.mitigations[0];
        const wrongMits = others.map(o => o.mitigations[0]).filter(Boolean);
        options = [correctMit, ...wrongMits].sort(() => Math.random() - 0.5);
        answer = correctMit;
        break;
      case 'detection':
        question = `Which detection applies to "${correct.name}"?`;
        const correctDet = correct.detections[0];
        const wrongDets = others.map(o => o.detections[0]).filter(Boolean);
        options = [correctDet, ...wrongDets].sort(() => Math.random() - 0.5);
        answer = correctDet;
        break;
      case 'platform':
        question = `"${correct.name}" targets which platform(s)?`;
        const correctPlat = correct.platforms.join(', ');
        const wrongPlats = others.map(o => o.platforms.join(', '));
        options = [correctPlat, ...wrongPlats].sort(() => Math.random() - 0.5);
        answer = correctPlat;
        break;
    }
    questions.push({ question, options, answer, technique: correct });
  }
  return questions;
}

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
            <div style="background:var(--surface2);padding:12px;border-radius:6px">
              <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px">Tactics Covered</div>
              <div style="font-size:20px;font-weight:700">${coverage.tacticsUsed.size} / ${TACTICS.length}</div>
            </div>
            <div style="background:var(--surface2);padding:12px;border-radius:6px">
              <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px">High Severity Steps</div>
              <div style="font-size:20px;font-weight:700;color:var(--red)">${chain.filter(t=>t.severity==='high').length}</div>
            </div>
            <div style="background:var(--surface2);padding:12px;border-radius:6px">
              <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px">Detection Sources Needed</div>
              <div style="font-size:20px;font-weight:700;color:var(--cyan)">${coverage.dataSources.size}</div>
            </div>
            <div style="background:var(--surface2);padding:12px;border-radius:6px">
              <div style="font-size:11px;color:var(--text2);text-transform:uppercase;margin-bottom:4px">Platforms Targeted</div>
              <div style="font-size:20px;font-weight:700;color:var(--accent2)">${coverage.platforms.size}</div>
            </div>
          </div>
          <h4 style="margin-bottom:8px">Required Data Sources</h4>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px">
            ${[...coverage.dataSources].map(d => `<span class="tag tag-ds">${d}</span>`).join('')}
          </div>
          <h4 style="margin-bottom:8px">Missing Tactic Coverage</h4>
          <div class="detection-gaps">
            ${coverage.missingTactics.length ? coverage.missingTactics.map(t => `
              <div class="gap-item"><span>${t}</span><span style="color:var(--yellow)">Not covered</span></div>
            `).join('') : '<div style="color:var(--green);font-size:13px">All major tactics covered!</div>'}
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderQuiz() {
  if (state.quizQuestions.length === 0) {
    return `
      <div class="quiz-view">
        <h2 style="margin-bottom:16px">ATT&CK Knowledge Quiz</h2>
        <p style="color:var(--text2);margin-bottom:24px">Test your knowledge of MITRE ATT&CK techniques, tactics, mitigations, and detections.</p>
        <button class="btn btn-primary" onclick="startQuiz()" style="font-size:16px;padding:12px 32px">Start 20-Question Quiz</button>
        ${state.quizHistory.length ? `
          <div style="margin-top:24px">
            <h4 style="margin-bottom:8px">Previous Scores</h4>
            ${state.quizHistory.slice(-5).reverse().map(h => `
              <div style="background:var(--surface);padding:8px 12px;border-radius:6px;margin:4px 0;font-size:13px;display:flex;justify-content:space-between">
                <span>${h.date}</span><span style="font-weight:700;color:${h.score >= 16 ? 'var(--green)' : h.score >= 10 ? 'var(--yellow)' : 'var(--red)'}">${h.score}/20</span>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }

  if (state.quizIndex >= state.quizQuestions.length) {
    return `
      <div class="quiz-view">
        <div class="quiz-score">
          <div style="font-size:14px;color:var(--text2);margin-bottom:8px">Your Score</div>
          <div class="score-num">${state.quizScore} / ${state.quizQuestions.length}</div>
          <div style="color:${state.quizScore >= 16 ? 'var(--green)' : state.quizScore >= 10 ? 'var(--yellow)' : 'var(--red)'};margin-top:4px">
            ${state.quizScore >= 18 ? 'Expert Level!' : state.quizScore >= 14 ? 'Strong Knowledge' : state.quizScore >= 10 ? 'Good Foundation' : 'Keep Studying'}
          </div>
        </div>
        <button class="btn btn-primary" onclick="startQuiz()" style="width:100%;margin-bottom:16px">Take Another Quiz</button>
        <button class="btn" onclick="switchTab('matrix')" style="width:100%">Back to Matrix</button>
      </div>
    `;
  }

  const q = state.quizQuestions[state.quizIndex];
  return `
    <div class="quiz-view">
      <div style="display:flex;justify-content:space-between;margin-bottom:16px;color:var(--text2);font-size:13px">
        <span>Question ${state.quizIndex + 1} of ${state.quizQuestions.length}</span>
        <span>Score: ${state.quizScore}</span>
      </div>
      <div style="background:var(--accent);height:4px;border-radius:2px;margin-bottom:16px">
        <div style="background:var(--green);height:100%;width:${((state.quizIndex)/state.quizQuestions.length)*100}%;border-radius:2px;transition:width 0.3s"></div>
      </div>
      <div class="quiz-card">
        <h3>${q.question}</h3>
        <div class="quiz-options">
          ${q.options.map((opt, i) => {
            let cls = 'quiz-option';
            if (state.quizAnswered) {
              if (opt === q.answer) cls += ' correct';
              else if (opt === state.selectedAnswer && opt !== q.answer) cls += ' incorrect';
            }
            return `<div class="${cls}" onclick="answerQuiz('${opt.replace(/'/g, "\\'")}')">${opt}</div>`;
          }).join('')}
        </div>
      </div>
      ${state.quizAnswered ? `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px">
          <div style="font-size:13px;color:var(--text2);margin-bottom:4px">Technique: ${q.technique.id} - ${q.technique.name}</div>
          <div style="font-size:12px;color:var(--text2)">${q.technique.desc.substring(0, 150)}...</div>
        </div>
        <button class="btn btn-primary" onclick="nextQuestion()" style="width:100%">${state.quizIndex < state.quizQuestions.length - 1 ? 'Next Question' : 'See Results'}</button>
      ` : ''}
    </div>
  `;
}

function analyzeChainCoverage(chain) {
  const tacticsUsed = new Set(chain.map(t => t.tactic));
  const dataSources = new Set();
  const platforms = new Set();
  chain.forEach(t => { t.dataSources.forEach(d => dataSources.add(d)); t.platforms.forEach(p => platforms.add(p)); });
  const allTactics = TACTICS.map(t => t.name);
  const missingTactics = allTactics.filter(t => !tacticsUsed.has(t));
  return { tacticsUsed, dataSources, platforms, missingTactics };
}

function switchTab(tab) { state.activeTab = tab; render(); }
function selectTactic(id) { state.activeTactic = id; render(); }
function updateSearch(q) { state.searchQuery = q; render(); }

function openDetail(tacticId, techId) {
  const tactic = TACTICS.find(t => t.id === tacticId);
  const tech = tactic.techniques.find(t => t.id === techId);
  state.detailTechnique = { ...tech, tactic: tactic.name, tacticColor: tactic.color };
  render();
}

function closeDetail() { state.detailTechnique = null; render(); }

function addToChain(techId) {
  const all = getAllTechniques();
  const tech = all.find(t => t.id === techId);
  if (tech && !state.attackChain.find(t => t.id === techId)) {
    state.attackChain.push(tech);
    closeDetail();
  }
}

function removeFromChain(idx) { state.attackChain.splice(idx, 1); render(); }
function clearChain() { state.attackChain = []; render(); }

function loadExampleChain() {
  const ids = ['T1566', 'T1059', 'T1547', 'T1068', 'T1003', 'T1562', 'T1021', 'T1005', 'T1041', 'T1486'];
  const all = getAllTechniques();
  state.attackChain = ids.map(id => all.find(t => t.id === id)).filter(Boolean);
  render();
}

function suggestNext() {
  if (state.attackChain.length === 0) { loadExampleChain(); return; }
  const covered = new Set(state.attackChain.map(t => t.tactic));
  const tacticOrder = TACTICS.map(t => t.name);
  const next = tacticOrder.find(t => !covered.has(t));
  if (next) {
    const tactic = TACTICS.find(t => t.name === next);
    const tech = tactic.techniques[Math.floor(Math.random() * tactic.techniques.length)];
    const all = getAllTechniques();
    const fullTech = all.find(t => t.id === tech.id);
    if (fullTech) state.attackChain.push(fullTech);
  }
  render();
}

function startQuiz() {
  state.quizQuestions = generateQuiz();
  state.quizIndex = 0;
  state.quizScore = 0;
  state.quizAnswered = false;
  state.selectedAnswer = null;
  render();
}

function answerQuiz(answer) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  state.selectedAnswer = answer;
  if (answer === state.quizQuestions[state.quizIndex].answer) state.quizScore++;
  render();
}

function nextQuestion() {
  state.quizIndex++;
  state.quizAnswered = false;
  state.selectedAnswer = null;
  if (state.quizIndex >= state.quizQuestions.length) {
    state.quizHistory.push({ date: new Date().toLocaleDateString(), score: state.quizScore });
  }
  render();
}

render();
</script>
</body>
</html>
