<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Security Research Toolkit</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#090b10;--s1:#0f1219;--s2:#171c28;--s3:#1f2637;--bd:#2a3148;--t1:#d7dde8;--t2:#7b8498;--ac:#10b981;--ac2:#34d399;--red:#f87171;--org:#fb923c;--yel:#fbbf24;--blue:#60a5fa;--pur:#a78bfa;--cyn:#22d3ee;--pink:#f472b6}
body{font-family:'SF Mono','Fira Code','Cascadia Code',monospace;background:var(--bg);color:var(--t1);min-height:100vh}
.app{display:flex;flex-direction:column;height:100vh}
.top-bar{background:var(--s1);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;gap:16px}
.top-bar h1{font-size:15px;font-weight:700;font-family:'Segoe UI',system-ui,sans-serif}
.top-bar h1 span{color:var(--ac)}
.tabs{display:flex;gap:2px;margin-left:20px}
.tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;background:transparent;border:none;color:var(--t2);transition:all .2s;font-family:inherit}
.tab:hover{background:var(--s2);color:var(--t1)}
.tab.active{background:var(--ac);color:#000;font-weight:600}
.main{flex:1;overflow-y:auto;padding:20px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:12px}
.card h3{font-size:13px;font-weight:600;margin-bottom:12px;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.attack-card{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px;transition:all .15s;cursor:pointer}
.attack-card:hover{border-color:var(--ac);transform:translateY(-1px)}
.attack-card h4{font-size:12px;margin-bottom:6px;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;gap:6px}
.attack-card p{font-size:11px;color:var(--t2);line-height:1.5}
.attack-card .meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px}
.t-red{background:rgba(248,113,113,.12);color:var(--red)}
.t-org{background:rgba(251,146,60,.12);color:var(--org)}
.t-yel{background:rgba(251,191,36,.12);color:var(--yel)}
.t-grn{background:rgba(16,185,129,.12);color:var(--ac)}
.t-blue{background:rgba(96,165,250,.12);color:var(--blue)}
.t-pur{background:rgba(167,139,250,.12);color:var(--pur)}
.t-cyn{background:rgba(34,211,238,.12);color:var(--cyn)}
.t-pink{background:rgba(244,114,182,.12);color:var(--pink)}
.section-header{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--t2);margin:20px 0 10px;font-family:'Segoe UI',system-ui,sans-serif}
.code-block{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:12px;font-size:11px;line-height:1.6;overflow-x:auto;margin:8px 0;white-space:pre}
.stat-row{display:flex;gap:12px;margin-bottom:16px}
.stat{flex:1;background:var(--s2);border-radius:8px;padding:12px;text-align:center}
.stat .num{font-size:24px;font-weight:700;font-family:'Segoe UI',system-ui,sans-serif}
.stat .lbl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--bd)}
.tl-item{position:relative;margin-bottom:16px;padding:10px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:8px}
.tl-item::before{content:'';position:absolute;left:-20px;top:14px;width:10px;height:10px;border-radius:50%;border:2px solid var(--ac);background:var(--bg)}
.tl-item h4{font-size:12px;margin-bottom:4px;font-family:'Segoe UI',system-ui,sans-serif}
.tl-item p{font-size:11px;color:var(--t2);line-height:1.5}
.tl-item .date{font-size:10px;color:var(--ac);margin-bottom:4px}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--bd)}
th{color:var(--t2);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
.expand-btn{cursor:pointer;color:var(--ac);font-size:11px;display:inline-flex;align-items:center;gap:4px;margin-top:8px}
.expand-btn:hover{color:var(--ac2)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const ATTACK_SURFACE = {
  llm: [
    {name:'Prompt Injection',severity:'critical',category:'Input Manipulation',desc:'Crafting inputs that override system prompts or manipulate model behavior. Includes direct injection (user provides malicious prompt) and indirect injection (malicious content in retrieved documents/web pages).',mitigations:['Input sanitization','Instruction hierarchy','Output filtering','Sandwich defense','Canary tokens in system prompts'],examples:['Ignore previous instructions and...','Indirect via poisoned web content','Multi-turn manipulation','Encoding attacks (base64, ROT13)'],atlas:'AML.T0051',papers:['Perez & Ribeiro 2022','Greshake et al. 2023','Liu et al. 2023']},
    {name:'Jailbreaking',severity:'critical',category:'Safety Bypass',desc:'Techniques to bypass model safety training and content policies through creative prompting strategies that exploit alignment gaps.',mitigations:['Constitutional AI','RLHF improvements','Multi-layer content filtering','Behavioral classifiers','Red team testing'],examples:['DAN prompts','Character roleplay bypass','Hypothetical framing','Few-shot priming attacks'],atlas:'AML.T0054',papers:['Wei et al. 2023','Shen et al. 2023','Chao et al. 2023']},
    {name:'Data Extraction / Memorization',severity:'high',category:'Privacy',desc:'Extracting training data, PII, or proprietary information from model outputs through targeted querying or divergence attacks.',mitigations:['Differential privacy in training','Output monitoring','Membership inference detection','Rate limiting','Canary insertion'],examples:['Training data extraction','PII leakage','Model inversion','Prefix attacks'],atlas:'AML.T0024',papers:['Carlini et al. 2021','Nasr et al. 2023','Lukas et al. 2023']},
    {name:'Tool/Plugin Abuse',severity:'high',category:'Agent Security',desc:'Exploiting LLM tool-use capabilities to perform unauthorized actions through the model, including file system access, code execution, and API abuse.',mitigations:['Least privilege for tools','Action confirmation','Sandboxing','Rate limiting tool calls','Output validation'],examples:['Code injection via tool calls','File exfiltration','Unauthorized API usage','Privilege escalation through tool chains'],atlas:'AML.T0052',papers:['Greshake et al. 2023','Ruan et al. 2023']},
    {name:'Supply Chain Poisoning',severity:'critical',category:'Training/Fine-tuning',desc:'Compromising training data, fine-tuning datasets, RLHF reward models, or model weights to embed backdoors or bias model behavior.',mitigations:['Data provenance tracking','Training data auditing','Model behavior testing','Red team evaluation','Gradient-based detection'],examples:['Backdoor triggers in training data','Poisoned RLHF preference data','Compromised model weights','Adapter/LoRA poisoning'],atlas:'AML.T0020',papers:['Wan et al. 2023','Rando & Tramèr 2023']},
    {name:'Model Theft / Extraction',severity:'high',category:'IP Theft',desc:'Stealing model architecture, weights, or capabilities through API queries, side-channel attacks, or supply chain compromise.',mitigations:['Query rate limiting','Watermarking','API monitoring','Differential privacy','Model distillation detection'],examples:['API-based model extraction','Side-channel on inference hardware','Hyperparameter stealing','Functionality cloning'],atlas:'AML.T0044',papers:['Tramèr et al. 2016','Krishna et al. 2020']}
  ],
  ml_general: [
    {name:'Adversarial Examples',severity:'high',category:'Evasion',desc:'Carefully crafted inputs that cause ML models to make incorrect predictions while appearing normal to humans. Works across vision, NLP, and audio.',mitigations:['Adversarial training','Input preprocessing','Certified defenses','Ensemble methods','Randomized smoothing'],examples:['Image perturbations (FGSM, PGD, C&W)','TextFooler for NLP','Audio adversarial examples','Physical-world adversarial patches'],atlas:'AML.T0015',papers:['Goodfellow et al. 2015','Carlini & Wagner 2017','Madry et al. 2018']},
    {name:'Data Poisoning',severity:'critical',category:'Training',desc:'Corrupting training data to introduce backdoors, degrade model performance, or cause targeted misclassifications.',mitigations:['Data sanitization','Anomaly detection in training','Robust training methods','Certified defenses','Spectral signatures'],examples:['Backdoor attacks (BadNets)','Clean-label poisoning','Gradient-based poisoning','Federated learning poisoning'],atlas:'AML.T0020',papers:['Gu et al. 2017','Shafahi et al. 2018','Bagdasaryan et al. 2020']},
    {name:'Model Inversion',severity:'high',category:'Privacy',desc:'Reconstructing private training data or sensitive attributes by querying the model and analyzing its outputs.',mitigations:['Differential privacy','Output perturbation','Membership inference monitoring','Access controls','Confidence score hiding'],examples:['Face reconstruction from classifiers','Attribute inference','GAN-based inversion','Gradient leakage in federated learning'],atlas:'AML.T0024',papers:['Fredrikson et al. 2015','Zhang et al. 2020']},
    {name:'Membership Inference',severity:'medium',category:'Privacy',desc:'Determining whether a specific data point was used in model training, violating data privacy expectations.',mitigations:['Differential privacy','Regularization','Model distillation','Prediction masking'],examples:['Shadow model attacks','Loss-based inference','Label-only attacks','Likelihood ratio attacks'],atlas:'AML.T0025',papers:['Shokri et al. 2017','Salem et al. 2019']}
  ],
  infra: [
    {name:'ML Pipeline Compromise',severity:'critical',category:'Infrastructure',desc:'Attacking the ML development pipeline including data ingestion, training infrastructure, model registries, and deployment systems.',mitigations:['Pipeline hardening','Signed model artifacts','Immutable infrastructure','Access controls','Audit logging'],examples:['Jupyter notebook exploitation','MLflow/Kubeflow vulnerabilities','Model registry poisoning','GPU cluster compromise'],atlas:'AML.T0010',papers:['Kumar et al. 2020']},
    {name:'Inference Infrastructure Attacks',severity:'high',category:'Infrastructure',desc:'Targeting model serving infrastructure including API gateways, GPU instances, model caching, and autoscaling mechanisms.',mitigations:['Rate limiting','DDoS protection','Input validation','Resource isolation','Monitoring'],examples:['Model DoS via crafted inputs','GPU memory exhaustion','Cache poisoning','Autoscaling abuse for cost amplification'],atlas:'AML.T0029',papers:['Shumailov et al. 2021']},
    {name:'Side-Channel Attacks',severity:'medium',category:'Hardware',desc:'Exploiting physical characteristics of ML hardware (timing, power, electromagnetic emanations) to extract model information.',mitigations:['Constant-time operations','Hardware isolation','Noise injection','Secure enclaves'],examples:['Timing attacks on inference','Power analysis','Cache-based attacks on GPUs','Electromagnetic emanation analysis'],atlas:'AML.T0035',papers:['Batina et al. 2019','Wei et al. 2020']}
  ]
};

const AI_THREAT_TIMELINE = [
  {date:'2023-Q1',title:'ChatGPT Jailbreaking Explosion',desc:'DAN and character-based jailbreaks widely shared. Demonstrated fundamental challenges in LLM alignment.'},
  {date:'2023-Q2',title:'Indirect Prompt Injection Research',desc:'Greshake et al. demonstrate automated indirect injection through web content, email, and documents.'},
  {date:'2023-Q3',title:'LLM Agent Security Concerns',desc:'Research shows LLM agents (AutoGPT, etc.) vulnerable to prompt injection leading to arbitrary code execution.'},
  {date:'2023-Q4',title:'Training Data Extraction at Scale',desc:'Nasr et al. extract gigabytes of training data from production LLMs using divergence attacks.'},
  {date:'2024-Q1',title:'OWASP Top 10 for LLMs v1.1',desc:'Industry consensus on top LLM security risks. Prompt injection ranked #1.'},
  {date:'2024-Q2',title:'Multi-modal Attack Vectors',desc:'Attacks demonstrated across text, image, and audio inputs in multi-modal models.'},
  {date:'2024-Q3',title:'RAG Poisoning Attacks',desc:'Research demonstrates poisoning retrieval-augmented generation through document injection.'},
  {date:'2024-Q4',title:'AI Agent Exploitation',desc:'Sophisticated attacks on AI agent frameworks exploiting tool use and chain-of-thought.'},
  {date:'2025-Q1',title:'Model Supply Chain Attacks',desc:'Compromised model hubs and adapter repositories used to distribute backdoored models.'},
  {date:'2025-Q2',title:'AI-Powered Cyber Attacks',desc:'Threat actors using LLMs for automated vulnerability discovery, exploit generation, and social engineering at scale.'}
];

const FRAMEWORKS = [
  {name:'MITRE ATLAS',desc:'Adversarial Threat Landscape for AI Systems. Extension of ATT&CK specifically for ML/AI threats.',url:'atlas.mitre.org',focus:'Comprehensive AI/ML attack taxonomy'},
  {name:'OWASP Top 10 for LLMs',desc:'Top 10 most critical security risks in Large Language Model applications.',url:'owasp.org/www-project-top-10-for-large-language-model-applications',focus:'LLM-specific vulnerabilities'},
  {name:'NIST AI RMF',desc:'AI Risk Management Framework providing guidelines for trustworthy AI development.',url:'nist.gov/artificial-intelligence',focus:'Risk management and governance'},
  {name:'EU AI Act',desc:'Regulatory framework classifying AI systems by risk and imposing requirements.',url:'artificialintelligenceact.eu',focus:'Compliance and regulation'},
  {name:'Google SAIF',desc:'Secure AI Framework for deploying AI systems securely in enterprise environments.',url:'safety.google/cybersecurity-advancements/saif',focus:'Enterprise AI security'},
  {name:'Microsoft AI Red Team',desc:'Practices for red teaming AI systems including LLMs and generative AI.',url:'microsoft.com/security/ai',focus:'Red teaming methodology'}
];

let state = { activeTab: 'landscape' };

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="top-bar">
      <h1><span>AI</span> Security Research Toolkit</h1>
      <div class="tabs">
        <div class="tab ${state.activeTab==='landscape'?'active':''}" onclick="setTab('landscape')">Threat Landscape</div>
        <div class="tab ${state.activeTab==='llm'?'active':''}" onclick="setTab('llm')">LLM Attacks</div>
        <div class="tab ${state.activeTab==='ml'?'active':''}" onclick="setTab('ml')">ML Attacks</div>
        <div class="tab ${state.activeTab==='infra'?'active':''}" onclick="setTab('infra')">Infrastructure</div>
        <div class="tab ${state.activeTab==='frameworks'?'active':''}" onclick="setTab('frameworks')">Frameworks</div>
        <div class="tab ${state.activeTab==='redteam'?'active':''}" onclick="setTab('redteam')">Red Team Guide</div>
      </div>
    </div>
    <div class="main">${renderTab()}</div>
  `;
}

function renderTab() {
  switch(state.activeTab) {
    case 'landscape': return renderLandscape();
    case 'llm': return renderAttacks(ATTACK_SURFACE.llm, 'LLM-Specific Attacks');
    case 'ml': return renderAttacks(ATTACK_SURFACE.ml_general, 'General ML Attacks');
    case 'infra': return renderAttacks(ATTACK_SURFACE.infra, 'Infrastructure Attacks');
    case 'frameworks': return renderFrameworks();
    case 'redteam': return renderRedTeam();
  }
}

function renderLandscape() {
  const allAttacks = [...ATTACK_SURFACE.llm, ...ATTACK_SURFACE.ml_general, ...ATTACK_SURFACE.infra];
  const critical = allAttacks.filter(a => a.severity === 'critical').length;
  const high = allAttacks.filter(a => a.severity === 'high').length;

  return `
    <div class="stat-row">
      <div class="stat"><div class="num" style="color:var(--red)">${critical}</div><div class="lbl">Critical Risks</div></div>
      <div class="stat"><div class="num" style="color:var(--org)">${high}</div><div class="lbl">High Risks</div></div>
      <div class="stat"><div class="num" style="color:var(--ac)">${allAttacks.length}</div><div class="lbl">Attack Vectors</div></div>
      <div class="stat"><div class="num" style="color:var(--blue)">${FRAMEWORKS.length}</div><div class="lbl">Frameworks</div></div>
    </div>
    <div class="card">
      <h3>AI/ML Threat Evolution Timeline</h3>
      <div class="timeline">
        ${AI_THREAT_TIMELINE.map(t => `
          <div class="tl-item">
            <div class="date">${t.date}</div>
            <h4>${t.title}</h4>
            <p>${t.desc}</p>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="card">
      <h3>Attack Surface Overview</h3>
      <div class="grid3">
        <div class="attack-card" onclick="setTab('llm')" style="border-left:3px solid var(--red)">
          <h4 style="color:var(--red)">LLM-Specific (${ATTACK_SURFACE.llm.length})</h4>
          <p>Prompt injection, jailbreaking, data extraction, tool abuse, supply chain, model theft</p>
        </div>
        <div class="attack-card" onclick="setTab('ml')" style="border-left:3px solid var(--org)">
          <h4 style="color:var(--org)">General ML (${ATTACK_SURFACE.ml_general.length})</h4>
          <p>Adversarial examples, data poisoning, model inversion, membership inference</p>
        </div>
        <div class="attack-card" onclick="setTab('infra')" style="border-left:3px solid var(--blue)">
          <h4 style="color:var(--blue)">Infrastructure (${ATTACK_SURFACE.infra.length})</h4>
          <p>Pipeline compromise, inference attacks, side-channels, GPU exploitation</p>
        </div>
      </div>
    </div>
    <div class="card">
      <h3>Microsoft AI + Security Context</h3>
      <p style="font-size:12px;color:var(--t2);line-height:1.8">
        Microsoft's AI security research spans multiple domains critical to this role. The team works on securing Azure AI services, Copilot stack security, threat detection using AI/ML, and adversarial robustness for production AI systems. Key areas include securing the ML pipeline from training to inference, defending against prompt injection in enterprise Copilot deployments, and developing novel detection capabilities using graph neural networks and transformer-based anomaly detection. Understanding both the offensive (how AI systems are attacked) and defensive (how AI improves security) perspectives is essential.
      </p>
    </div>
  `;
}

function renderAttacks(attacks, title) {
  return `
    <div class="section-header">${title}</div>
    ${attacks.map(a => `
      <div class="card">
        <h3>
          ${a.name}
          <span class="badge ${a.severity==='critical'?'t-red':a.severity==='high'?'t-org':'t-yel'}" style="font-size:9px">${a.severity.toUpperCase()}</span>
          <span class="tag t-pur">${a.category}</span>
          <span class="tag t-cyn">${a.atlas}</span>
        </h3>
        <p style="font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:12px">${a.desc}</p>
        <div class="grid2">
          <div>
            <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Attack Examples</div>
            ${a.examples.map(e => `<div style="font-size:11px;padding:3px 0;color:var(--red)">+ ${e}</div>`).join('')}
          </div>
          <div>
            <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Mitigations</div>
            ${a.mitigations.map(m => `<div style="font-size:11px;padding:3px 0;color:var(--ac)">+ ${m}</div>`).join('')}
          </div>
        </div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)">
          <div style="font-size:10px;color:var(--t2);margin-bottom:4px">KEY PAPERS</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${a.papers.map(p => `<span class="tag t-blue">${p}</span>`).join('')}
          </div>
        </div>
      </div>
    `).join('')}
  `;
}

function renderFrameworks() {
  return `
    <div class="section-header">AI Security Frameworks & Standards</div>
    ${FRAMEWORKS.map(f => `
      <div class="card">
        <h3>${f.name} <span class="tag t-grn">${f.focus}</span></h3>
        <p style="font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:8px">${f.desc}</p>
        <div style="font-size:11px;color:var(--blue)">${f.url}</div>
      </div>
    `).join('')}
    <div class="card">
      <h3>OWASP Top 10 for LLM Applications (2024)</h3>
      <table>
        <tr><th>#</th><th>Vulnerability</th><th>Risk Level</th><th>Key Concern</th></tr>
        <tr><td>1</td><td>Prompt Injection</td><td><span class="tag t-red">Critical</span></td><td>Direct and indirect manipulation of LLM behavior</td></tr>
        <tr><td>2</td><td>Insecure Output Handling</td><td><span class="tag t-red">Critical</span></td><td>Unvalidated LLM output enabling downstream attacks</td></tr>
        <tr><td>3</td><td>Training Data Poisoning</td><td><span class="tag t-red">Critical</span></td><td>Manipulated training data creating backdoors</td></tr>
        <tr><td>4</td><td>Model Denial of Service</td><td><span class="tag t-org">High</span></td><td>Resource exhaustion through crafted inputs</td></tr>
        <tr><td>5</td><td>Supply Chain Vulnerabilities</td><td><span class="tag t-org">High</span></td><td>Compromised model components, plugins, data</td></tr>
        <tr><td>6</td><td>Sensitive Info Disclosure</td><td><span class="tag t-org">High</span></td><td>PII and proprietary data leakage</td></tr>
        <tr><td>7</td><td>Insecure Plugin Design</td><td><span class="tag t-org">High</span></td><td>Excessive permissions in LLM tool integrations</td></tr>
        <tr><td>8</td><td>Excessive Agency</td><td><span class="tag t-org">High</span></td><td>LLM granted too many capabilities/permissions</td></tr>
        <tr><td>9</td><td>Overreliance</td><td><span class="tag t-yel">Medium</span></td><td>Trusting LLM output without verification</td></tr>
        <tr><td>10</td><td>Model Theft</td><td><span class="tag t-yel">Medium</span></td><td>Unauthorized access/extraction of model IP</td></tr>
      </table>
    </div>
  `;
}

function renderRedTeam() {
  return `
    <div class="section-header">AI Red Teaming Methodology</div>
    <div class="card">
      <h3>Red Team Engagement Phases</h3>
      <div style="display:flex;gap:2px;margin-bottom:16px;overflow-x:auto">
        ${['Scoping','Reconnaissance','Attack Development','Execution','Analysis','Reporting'].map((p,i) => `
          <div style="flex:1;min-width:120px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:18px;font-weight:700;color:var(--ac)">${i+1}</div>
            <div style="font-size:11px;margin-top:4px">${p}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="card">
      <h3>LLM Red Teaming Checklist</h3>
      <table>
        <tr><th>Category</th><th>Test</th><th>Technique</th></tr>
        <tr><td rowspan="4" style="vertical-align:top;color:var(--red)">Prompt Injection</td><td>Direct injection</td><td>System prompt override attempts</td></tr>
        <tr><td>Indirect injection</td><td>Malicious content in retrieved documents</td></tr>
        <tr><td>Multi-turn manipulation</td><td>Gradual context shifting across turns</td></tr>
        <tr><td>Encoding attacks</td><td>Base64, ROT13, Unicode tricks</td></tr>
        <tr><td rowspan="3" style="vertical-align:top;color:var(--org)">Jailbreaking</td><td>Character roleplay</td><td>DAN, evil assistant, fictional scenarios</td></tr>
        <tr><td>Instruction hierarchy</td><td>Claim higher authority than system prompt</td></tr>
        <tr><td>Token manipulation</td><td>Unusual tokenization to bypass filters</td></tr>
        <tr><td rowspan="3" style="vertical-align:top;color:var(--blue)">Data Extraction</td><td>Training data probe</td><td>Divergence attacks, repeated token prefixes</td></tr>
        <tr><td>System prompt extraction</td><td>Ask model to reveal its instructions</td></tr>
        <tr><td>PII elicitation</td><td>Query for memorized personal information</td></tr>
        <tr><td rowspan="3" style="vertical-align:top;color:var(--pur)">Tool/Agent Abuse</td><td>Capability escalation</td><td>Chain tool calls for unauthorized actions</td></tr>
        <tr><td>Data exfiltration</td><td>Use tools to send data externally</td></tr>
        <tr><td>Resource abuse</td><td>Exhaust compute/API quotas via tool loops</td></tr>
        <tr><td rowspan="2" style="vertical-align:top;color:var(--cyn)">Output Manipulation</td><td>Hallucination exploitation</td><td>Cause model to generate false authoritative claims</td></tr>
        <tr><td>Format injection</td><td>Generate outputs that exploit downstream parsers</td></tr>
